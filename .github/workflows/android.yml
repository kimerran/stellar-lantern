name: Android APK

# Builds a debug APK and uploads it as a workflow artifact (issue #4).
#
# This workflow is intentionally self-guarding: until the Capacitor Android
# project exists (capacitor.config.* + android/), the build steps are skipped so
# the workflow stays green. Once the native project is committed, the APK build
# activates automatically — no edits required here.

on:
  pull_request:
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.*'
      - 'package.json'
      - 'vite.config.*'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Capacitor Android project
        id: check
        run: |
          if ls capacitor.config.* >/dev/null 2>&1 && [ -d android ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Capacitor Android project not present yet — skipping APK build (see #4)."
          fi

      - name: Setup Node
        if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        if: steps.check.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        if: steps.check.outputs.ready == 'true'
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        if: steps.check.outputs.ready == 'true'
        run: npm ci

      - name: Build web assets (mobile target)
        if: steps.check.outputs.ready == 'true'
        # Uses the mobile build (plain SPA, no MV3/crx). Falls back to `build`
        # until a dedicated `build:mobile` script exists.
        run: npm run build:mobile --if-present || npm run build

      - name: Sync Capacitor
        if: steps.check.outputs.ready == 'true'
        run: npx cap sync android

      - name: Assemble debug APK
        if: steps.check.outputs.ready == 'true'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Report APK size
        if: steps.check.outputs.ready == 'true'
        run: |
          APK=$(find android -path '*/outputs/apk/debug/*.apk' | head -1)
          echo "APK: $APK"
          ls -lh "$APK" | awk '{print "Size:", $5}'
          # Budget gate (prototype): warn if the debug APK exceeds 15 MB.
          BYTES=$(stat -c%s "$APK")
          echo "Bytes: $BYTES"
          if [ "$BYTES" -gt $((15 * 1024 * 1024)) ]; then
            echo "::warning::Debug APK exceeds the 15 MB prototype budget."
          fi

      - name: Upload APK artifact
        if: steps.check.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lantern-debug-apk
          path: android/**/outputs/apk/debug/*.apk
          if-no-files-found: error
