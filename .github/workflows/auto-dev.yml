name: Auto-dev (agent issue processor)

# Runs the Claude Code agent against a labeled issue, following the workflow in
# ./auto-dev.md: branch from develop, implement, run the Definition of Done, and
# open a PR (base: develop). It never auto-merges — a human decides.
#
# PREREQUISITES (one-time, by a repo admin):
#   1. Add repo secret  ANTHROPIC_API_KEY  (Settings → Secrets → Actions).
#   2. Allow Actions to create PRs: Settings → Actions → General →
#      "Allow GitHub Actions to create and approve pull requests".
#   3. Create the labels `agent-ready` and `agent-claude` (or let the agent use them).
#
# Trigger: add the `agent-ready` label to an issue, or run manually with an issue number.
# NOTE: action input names can change across versions — pin/adjust @v1 as needed.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: 'Issue number to process'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: auto-dev-${{ github.event.issue.number || github.event.inputs.issue }}
  cancel-in-progress: false

jobs:
  agent:
    # Only the agent-ready label (or a manual dispatch) triggers a run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'agent-ready' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code on the issue
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are this repository's autonomous issue processor. Follow the instructions in
            ./auto-dev.md exactly, for GitHub issue #${{ github.event.issue.number || github.event.inputs.issue }} only.

            Branch from `develop` (base every PR on `develop`, never `main`). Implement the change,
            then run the Definition of Done and only open a PR if ALL pass:
              npm run typecheck && npm run lint && npm test && npm run build && npm run build:mobile
            Append a one-line entry to docs/features.md. Do NOT merge the PR.
            If the issue is unclear or the checks fail, comment on the issue and add the
            `needs-clarification` label instead of opening a broken PR.
          claude_args: |
            --max-turns 50
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
